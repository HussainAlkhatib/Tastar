name: Build Tastar Installer

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write   # Required to upload to releases

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'   # Speeds up dependency installation

      - name: Inject agent and skill content
        run: python inject.py

      - name: Install PyInstaller
        run: pip install pyinstaller

      - name: Build executable
        run: python build.py

      - name: Upload artifacts to release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            dist/win/tastar-installer.exe
            dist/mac/tastar-installer
            dist/lin/tastar-installer
          overwrite: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}