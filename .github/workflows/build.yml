name: Build Tastar Installer

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    strategy:
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Inject agent and skill content
        run: python inject.py

      - name: Install PyInstaller
        run: pip install pyinstaller

      - name: Build executable
        run: python build.py

      - name: Upload artifact (for later release)
        uses: actions/upload-artifact@v4
        with:
          name: tastar-${{ runner.os }}
          path: dist/*/
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    timeout-minutes: 10
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Organize files for release
        run: |
          mkdir -p release_files
          # Windows
          if [ -d "artifacts/tastar-Windows/win" ]; then
            cp artifacts/tastar-Windows/win/tastar-installer.exe release_files/tastar-installer-windows.exe
          fi
          # macOS
          if [ -d "artifacts/tastar-macOS/mac" ]; then
            cp artifacts/tastar-macOS/mac/tastar-installer release_files/tastar-installer-macos
          fi
          # Linux
          if [ -d "artifacts/tastar-Linux/lin" ]; then
            cp artifacts/tastar-Linux/lin/tastar-installer release_files/tastar-installer-linux
          fi
          ls -la release_files

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: release_files/*
          overwrite: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}